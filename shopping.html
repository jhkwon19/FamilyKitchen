<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>코스트코 장보기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shopping.css?v=2">
</head>
<body>
  <main class="shopping-shell">
    <section class="hero">
      <div class="hero__content">
        <nav class="workspace-nav" aria-label="주요 메뉴">
          <a class="workspace-nav__link" href="/">메인</a>
          <a class="workspace-nav__link" href="/recipes">레시피</a>
          <a class="workspace-nav__link is-active" href="/shopping" aria-current="page">장보기</a>
        </nav>
        <p class="eyebrow">공식몰 연동 장보기</p>
        <h1>코스트코 장보기</h1>
        <p class="lede">장보기 페이지 안에서 코스트코 공식몰 검색 결과를 바로 불러오고, 예상 금액과 구매 진행 상황을 함께 관리하는 화면입니다.</p>
      </div>
    </section>

    <section class="toolbar" aria-label="장보기 준비">
      <div class="toolbar__intro">
        <p class="eyebrow">예산과 검색 설정</p>
        <h2>장보기 준비</h2>
      </div>
      <div class="toolbar__workspace">
        <div class="toolbar__controls" aria-label="예산 설정">
          <div class="toolbar__action">
            <button id="resetCartBtn" class="btn btn-ghost" type="button">체크리스트 초기화</button>
          </div>
          <div class="toolbar__budget">
            <label class="field field--budget">
              <span>이번 장보기 예산</span>
              <input id="budgetInput" type="number" min="0" step="1000" placeholder="예: 250000">
            </label>
          </div>
        </div>
        <div class="toolbar__summary" aria-label="장보기 요약">
          <div class="summary__grid">
            <article class="summary-card">
              <span class="summary-card__label">예상 총액</span>
              <strong id="estimatedTotal">0원</strong>
            </article>
            <article class="summary-card">
              <span class="summary-card__label">카트에 담은 금액</span>
              <strong id="pickedTotal">0원</strong>
            </article>
            <article class="summary-card">
              <span class="summary-card__label">남은 예정 금액</span>
              <strong id="remainingTotal">0원</strong>
            </article>
            <article class="summary-card">
              <span class="summary-card__label">예산 대비</span>
              <strong id="budgetDelta">예산 미입력</strong>
            </article>
          </div>
        </div>
      </div>
    </section>

    <section class="layout">
      <div class="panel">
        <div class="panel__header">
          <div class="panel__title">
            <div>
              <p class="eyebrow">공식몰 검색 결과</p>
              <h2>검색 결과</h2>
            </div>
          </div>
          <p id="catalogStatus" class="panel__hint">공식몰 검색 데이터를 불러오는 중입니다.</p>
        </div>
        <div class="results-toolbar">
          <label class="field field--search">
            <span>상품 검색</span>
            <input id="searchInput" type="search" placeholder="예: dyson, vinegar, 청바지">
          </label>
          <button id="refreshCatalogBtn" class="btn btn-primary" type="button">공식몰 결과 새로고침</button>
        </div>
        <div id="resultsMeta" class="results-meta"></div>
        <div id="searchResults" class="product-grid"></div>
      </div>

      <div class="panel panel--cart">
        <div class="panel__header">
          <div class="panel__title">
            <p class="eyebrow">실사용 흐름 검증</p>
            <h2>장보기 리스트</h2>
          </div>
          <p id="cartMeta" class="panel__hint">0개 담김</p>
        </div>
        <div id="cartList" class="cart-list"></div>
      </div>
    </section>
  </main>

  <template id="resultCardTemplate">
    <article class="product-card">
      <img data-image alt="">
      <div class="product-card__body">
        <h3 class="product-card__title" data-title></h3>
        <div class="product-card__pricing">
          <p class="product-card__original" data-original-price hidden></p>
          <p class="product-card__discount" data-discount hidden></p>
          <p class="product-card__price" data-price></p>
        </div>
        <p class="product-card__period" data-discount-period hidden></p>
        <p class="product-card__note" data-note></p>
        <div class="product-card__actions">
          <button type="button" class="btn btn-primary" data-add>리스트에 담기</button>
          <a target="_blank" rel="noreferrer" class="btn btn-link" data-open>공식몰 보기</a>
        </div>
      </div>
    </article>
  </template>

  <template id="cartItemTemplate">
    <article class="cart-item">
      <label class="cart-item__check">
        <input type="checkbox" data-check>
        <span></span>
      </label>
      <img data-image alt="">
      <div class="cart-item__body">
        <div class="cart-item__top">
          <h3 class="cart-item__title" data-title></h3>
          <button type="button" class="btn-icon" data-remove aria-label="항목 삭제">✕</button>
        </div>
        <div class="cart-item__fields">
          <label class="mini-field">
            <span>수량</span>
            <input type="number" min="1" step="1" data-qty>
          </label>
          <label class="mini-field">
            <span>예상 가격</span>
            <input type="number" min="0" step="100" data-price>
          </label>
        </div>
        <div class="cart-item__meta">
          <span data-total></span>
          <a target="_blank" rel="noreferrer" data-open>공식몰 열기</a>
        </div>
      </div>
    </article>
  </template>

  <script src="shopping.js?v=1" type="module"></script>
</body>
</html>
