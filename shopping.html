<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>코스트코 장보기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shopping.css?v=23">
</head>
<body>
  <main class="shopping-shell">
    <section class="hero">
      <div class="hero__content">
        <nav class="workspace-nav" aria-label="주요 메뉴">
          <a class="workspace-nav__link" href="/">메인</a>
          <a class="workspace-nav__link" href="/recipes">레시피</a>
          <a class="workspace-nav__link is-active" href="/shopping" aria-current="page">장보기</a>
        </nav>
        <p class="eyebrow">공식몰 연동 장보기</p>
        <h1>코스트코 장보기</h1>
        <p class="lede">장보기 페이지 안에서 코스트코 공식몰 검색 결과를 바로 불러오고, 예상 금액과 구매 진행 상황을 함께 관리하는 화면입니다.</p>
      </div>
    </section>

    <section class="toolbar" aria-label="장보기 준비">
      <div class="toolbar__intro">
        <div class="toolbar__intro-copy">
          <p class="eyebrow">예산과 검색 설정</p>
          <h2>장보기 준비</h2>
        </div>
        <button id="resetCartBtn" class="btn btn-ghost toolbar__reset" type="button">체크리스트 초기화</button>
      </div>
      <div class="toolbar__workspace">
        <div class="toolbar__controls" aria-label="예산 설정">
          <div class="toolbar__budget">
            <label class="field field--budget">
              <span>이번 장보기 예산</span>
              <input id="budgetInput" type="number" min="0" step="1000" placeholder="예: 250000">
            </label>
          </div>
        </div>
        <div class="toolbar__summary" aria-label="장보기 요약">
          <div class="summary__grid">
            <article class="summary-card">
              <span class="summary-card__label">예상 총액</span>
              <strong id="estimatedTotal">0원</strong>
            </article>
            <article class="summary-card">
              <span class="summary-card__label">카트에 담은 금액</span>
              <strong id="pickedTotal">0원</strong>
            </article>
            <article class="summary-card">
              <span class="summary-card__label">남은 예정 금액</span>
              <strong id="remainingTotal">0원</strong>
            </article>
            <article class="summary-card">
              <span class="summary-card__label">예산 대비</span>
              <strong id="budgetDelta">예산 미입력</strong>
            </article>
          </div>
        </div>
      </div>
    </section>

    <section class="layout">
      <div class="panel panel--search">
        <div class="panel__header">
          <div class="panel__title">
            <div>
              <p class="eyebrow">공식몰 검색 결과</p>
              <h2>검색 결과</h2>
            </div>
          </div>
          <p id="catalogStatus" class="panel__hint">공식몰 검색 데이터를 불러오는 중입니다.</p>
        </div>
        <div class="results-toolbar">
          <label class="field field--search">
            <span>상품 검색</span>
            <input id="searchInput" type="search" placeholder="예: dyson, vinegar, 청바지">
          </label>
          <div id="categoryFilterGroup" class="category-filter" aria-label="카테고리 필터">
            <label class="field field--category">
              <span>카테고리</span>
              <button id="categoryPickerBtn" class="category-picker__button" type="button" aria-expanded="false" aria-controls="categoryPickerPanel">전체</button>
            </label>
          </div>
          <button id="refreshCatalogBtn" class="btn btn-primary" type="button">공식몰 결과 새로고침</button>
        </div>
        <div id="resultsMeta" class="results-meta"></div>
        <div id="searchResults" class="product-grid"></div>
      </div>

      <div class="panel panel--cart">
        <div class="panel__header">
          <div class="panel__title">
            <p class="eyebrow">실사용 흐름 검증</p>
            <h2>장보기 리스트</h2>
          </div>
          <p id="cartMeta" class="panel__hint">0개 담김</p>
        </div>
        <div class="cart-panel__controls">
          <div class="toolbar__history">
            <div class="toolbar__history-fields">
              <label class="field field--month">
                <span>저장 월</span>
                <select id="historyMonthSelect"></select>
              </label>
              <label class="field field--list">
                <span>저장된 리스트</span>
                <select id="shoppingListSelect"></select>
              </label>
              <button id="saveListBtn" class="btn btn-primary toolbar__mini-btn" type="button">현재 리스트 저장</button>
              <button id="saveAsNewListBtn" class="btn btn-ghost toolbar__mini-btn" type="button">새 리스트로 저장</button>
              <button id="deleteListBtn" class="btn btn-ghost toolbar__mini-btn" type="button">리스트 삭제</button>
            </div>
          </div>
        </div>
        <div id="cartList" class="cart-list"></div>
      </div>
    </section>
  </main>

  <div id="categoryPickerBackdrop" class="category-picker-backdrop" hidden></div>
  <div id="categoryPickerPanel" class="category-picker" hidden role="dialog" aria-modal="true" aria-labelledby="categoryPickerPath">
    <div class="category-picker__head">
      <strong id="categoryPickerPath">전체 카테고리</strong>
      <button id="categoryClearBtn" class="category-picker__text-btn" type="button">전체</button>
    </div>
    <div id="categoryPickerTrail" class="category-picker__trail"></div>
    <div id="categoryPickerList" class="category-picker__list"></div>
    <div class="category-picker__actions">
      <button id="categorySelectCurrentBtn" class="btn btn-primary" type="button">현재 메뉴 선택</button>
      <button id="categoryPickerCloseBtn" class="btn btn-ghost" type="button">닫기</button>
    </div>
  </div>

  <template id="resultCardTemplate">
    <article class="product-card">
      <img data-image alt="">
      <div class="product-card__body">
        <h3 class="product-card__title" data-title></h3>
        <div class="product-card__pricing">
          <p class="product-card__original" data-original-price hidden></p>
          <p class="product-card__discount" data-discount hidden></p>
          <p class="product-card__price" data-price></p>
        </div>
        <p class="product-card__period" data-discount-period hidden></p>
        <p class="product-card__note" data-note></p>
        <div class="product-card__actions">
          <button type="button" class="btn btn-primary" data-add>리스트에 담기</button>
          <a target="_blank" rel="noreferrer" class="btn btn-link" data-open>공식몰 보기</a>
        </div>
        <p class="product-card__category" data-category hidden></p>
      </div>
    </article>
  </template>

  <template id="cartItemTemplate">
    <article class="cart-item">
      <label class="cart-item__check">
        <input type="checkbox" data-check>
        <span></span>
      </label>
      <img data-image alt="">
      <div class="cart-item__body">
        <div class="cart-item__top">
          <h3 class="cart-item__title" data-title></h3>
          <button type="button" class="btn-icon" data-remove aria-label="항목 삭제">✕</button>
        </div>
        <div class="cart-item__fields">
          <label class="mini-field">
            <span>수량</span>
            <input type="number" min="1" step="1" data-qty>
          </label>
          <label class="mini-field">
            <span>예상 가격</span>
            <input type="number" min="0" step="100" data-price>
          </label>
        </div>
        <div class="cart-item__meta">
          <span data-total></span>
          <a target="_blank" rel="noreferrer" data-open>공식몰 열기</a>
        </div>
      </div>
    </article>
  </template>

  <script>
    (function () {
      var button = document.getElementById('categoryPickerBtn');
      var panel = document.getElementById('categoryPickerPanel');
      var backdrop = document.getElementById('categoryPickerBackdrop');
      var list = document.getElementById('categoryPickerList');
      var trail = document.getElementById('categoryPickerTrail');
      var title = document.getElementById('categoryPickerPath');
      var closeButton = document.getElementById('categoryPickerCloseBtn');
      var clearButton = document.getElementById('categoryClearBtn');
      var selectButton = document.getElementById('categorySelectCurrentBtn');
      var tree = [];
      var browsingPath = '';
      var selectedPath = '';
      var loading = false;

      if (!button || !panel || !list || !trail || !title) return;

      function setHidden(node, hidden) {
        if (!node) return;
        node.hidden = hidden;
      }

      function findNode(path) {
        if (!path) return null;
        var nodes = tree;
        var found = null;
        var parts = path.split('/');
        for (var index = 0; index < parts.length; index += 1) {
          var key = parts.slice(0, index + 1).join('/');
          found = null;
          for (var i = 0; i < nodes.length; i += 1) {
            if (nodes[i].key === key) {
              found = nodes[i];
              break;
            }
          }
          nodes = found && Array.isArray(found.children) ? found.children : [];
        }
        return found;
      }

      function labelFor(path) {
        if (!path) return '';
        var labels = [];
        var nodes = tree;
        var parts = path.split('/');
        for (var index = 0; index < parts.length; index += 1) {
          var key = parts.slice(0, index + 1).join('/');
          var found = null;
          for (var i = 0; i < nodes.length; i += 1) {
            if (nodes[i].key === key) {
              found = nodes[i];
              break;
            }
          }
          if (!found) break;
          labels.push(found.label);
          nodes = Array.isArray(found.children) ? found.children : [];
        }
        return labels.join(' > ');
      }

      function renderTrail() {
        trail.innerHTML = '';
        var root = document.createElement('button');
        root.type = 'button';
        root.textContent = '전체';
        root.addEventListener('click', function (event) {
          event.preventDefault();
          event.stopPropagation();
          browsingPath = '';
          renderPicker();
        });
        trail.appendChild(root);

        if (!browsingPath) return;
        var parts = browsingPath.split('/');
        for (var index = 0; index < parts.length; index += 1) {
          var key = parts.slice(0, index + 1).join('/');
          var node = findNode(key);
          if (!node) continue;
          var item = document.createElement('button');
          item.type = 'button';
          item.textContent = node.label;
          item.setAttribute('data-path', key);
          item.addEventListener('click', function (event) {
            event.preventDefault();
            event.stopPropagation();
            browsingPath = event.currentTarget.getAttribute('data-path') || '';
            renderPicker();
          });
          trail.appendChild(item);
        }
      }

      function renderPicker() {
        var current = findNode(browsingPath);
        var children = current ? current.children || [] : tree;
        title.textContent = labelFor(browsingPath) || '전체 카테고리';
        if (selectButton) selectButton.disabled = !browsingPath;
        renderTrail();

        list.innerHTML = '';
        if (loading) {
          var loadingNode = document.createElement('p');
          loadingNode.className = 'category-picker__empty';
          loadingNode.textContent = '카테고리를 불러오는 중입니다.';
          list.appendChild(loadingNode);
          return;
        }

        if (!children.length) {
          var empty = document.createElement('p');
          empty.className = 'category-picker__empty';
          empty.textContent = '더 이상 하위 메뉴가 없습니다.';
          list.appendChild(empty);
          return;
        }

        children.forEach(function (node) {
          var hasChildren = Array.isArray(node.children) && node.children.length > 0;
          var item = document.createElement('button');
          item.type = 'button';
          item.className = 'category-picker__item';
          item.setAttribute('data-path', node.key);
          item.setAttribute('data-has-children', hasChildren ? '1' : '0');
          item.innerHTML = '<span></span><em></em>';
          item.querySelector('span').textContent = node.label;
          item.querySelector('em').textContent = hasChildren ? '하위 메뉴 ›' : '선택';
          item.addEventListener('click', function (event) {
            event.preventDefault();
            event.stopPropagation();
            var path = event.currentTarget.getAttribute('data-path') || '';
            if (event.currentTarget.getAttribute('data-has-children') === '1') {
              browsingPath = path;
              renderPicker();
              return;
            }
            selectedPath = path;
            button.textContent = labelFor(path) || '전체';
            closePicker();
            if (window.familyKitchenShopping && window.familyKitchenShopping.selectCategoryPath) {
              window.familyKitchenShopping.selectCategoryPath(path);
            }
          });
          list.appendChild(item);
        });
      }

      function loadCategories() {
        if (loading || tree.length) return;
        loading = true;
        renderPicker();
        fetch('/api/shopping/categories')
          .then(function (response) { return response.ok ? response.json() : { items: [] }; })
          .then(function (payload) {
            tree = Array.isArray(payload.items) ? payload.items : [];
          })
          .catch(function () {
            tree = [];
          })
          .then(function () {
            loading = false;
            renderPicker();
          });
      }

      function openPicker() {
        browsingPath = selectedPath;
        renderPicker();
        setHidden(panel, false);
        setHidden(backdrop, false);
        button.setAttribute('aria-expanded', 'true');
        loadCategories();
      }

      function closePicker() {
        setHidden(panel, true);
        setHidden(backdrop, true);
        button.setAttribute('aria-expanded', 'false');
      }

      button.addEventListener('click', function (event) {
        event.preventDefault();
        event.stopPropagation();
        if (event.stopImmediatePropagation) event.stopImmediatePropagation();
        if (panel.hidden) {
          openPicker();
        } else {
          closePicker();
        }
      }, true);

      if (backdrop) backdrop.addEventListener('click', closePicker);
      if (closeButton) closeButton.addEventListener('click', function (event) {
        event.preventDefault();
        closePicker();
      });
      if (clearButton) clearButton.addEventListener('click', function (event) {
        event.preventDefault();
        selectedPath = '';
        browsingPath = '';
        button.textContent = '전체';
        closePicker();
        if (window.familyKitchenShopping && window.familyKitchenShopping.selectCategoryPath) {
          window.familyKitchenShopping.selectCategoryPath('');
        }
      });
      if (selectButton) selectButton.addEventListener('click', function (event) {
        event.preventDefault();
        if (!browsingPath) return;
        selectedPath = browsingPath;
        button.textContent = labelFor(selectedPath) || '전체';
        closePicker();
        if (window.familyKitchenShopping && window.familyKitchenShopping.selectCategoryPath) {
          window.familyKitchenShopping.selectCategoryPath(selectedPath);
        }
      });
    }());
  </script>
  <script src="/shopping.js?v=24"></script>
</body>
</html>
