<!doctype html>
<html lang="ko" data-variant="mobile">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘 뭐 해먹지? · 모바일</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=60">
</head>
<body>
  <header class="hero">
    <div class="hero__content">
      <p class="eyebrow">우리 레시피 노트</p>
      <h1>오늘 뭐 해먹지?</h1>
      <p class="lede">먹고 싶은 메뉴를 간단히 모아봐요.</p>
      <div class="hero__actions">
        <button id="refreshRecipesBtn" class="btn btn-ghost">새로고침</button>
        <button id="toggleFormBtn" class="btn btn-primary">레시피 추가하기</button>
      </div>
    </div>
  </header>

  <main class="layout">
    <section class="panel">
      <div class="panel__header">
        <h2>찜해둔 요리들</h2>
        <div class="panel__tools">
          <div class="filter-tabs" aria-label="레시피 필터">
            <button id="allFilterBtn" type="button" class="filter-tab is-active">전체</button>
            <div class="filter-menu">
              <button id="cuisineFilterBtn" type="button" class="filter-tab">분류</button>
              <div id="cuisineFilterBar" class="cuisine-filters" hidden>
                <button type="button" class="cuisine-filter is-active" data-cuisine-filter="all">전체</button>
                <button type="button" class="cuisine-filter" data-cuisine-filter="korean">한식</button>
                <button type="button" class="cuisine-filter" data-cuisine-filter="chinese">중식</button>
                <button type="button" class="cuisine-filter" data-cuisine-filter="japanese">일식</button>
                <button type="button" class="cuisine-filter" data-cuisine-filter="western">양식</button>
                <button type="button" class="cuisine-filter" data-cuisine-filter="asian">아시안</button>
                <button type="button" class="cuisine-filter" data-cuisine-filter="dessert">디저트</button>
                <button type="button" class="cuisine-filter" data-cuisine-filter="snack">간식</button>
                <button type="button" class="cuisine-filter" data-cuisine-filter="fusion">퓨전</button>
                <button type="button" class="cuisine-filter" data-cuisine-filter="other">기타</button>
              </div>
            </div>
            <button id="favoriteFilterBtn" type="button" class="filter-tab">즐겨찾기</button>
          </div>
          <div class="filter">
            <input id="searchInput" type="search" placeholder="제목, 태그, 메모 검색">
            <select id="sortSelect">
              <option value="newest">최신순</option>
              <option value="oldest">오래된순</option>
              <option value="title">제목순</option>
            </select>
          </div>
        </div>
      </div>
      <div id="recipeList" class="recipes"></div>
      <p id="emptyState" class="muted">아직 저장된 레시피가 없습니다. 위에 링크를 추가해보세요.</p>
    </section>
  </main>

  <div id="drawer" class="drawer">
    <div class="drawer__backdrop" id="drawerBackdrop"></div>
    <div class="drawer__panel">
        <div class="drawer__header">
        <div>
          <p class="eyebrow" id="recipeDrawerEyebrow">레시피 등록</p>
          <h2 id="recipeDrawerTitle"></h2>
        </div>
        <button id="closeDrawerBtn" class="icon-btn" aria-label="닫기">✕</button>
      </div>
      <form id="recipeForm" class="form">
        <div class="form__row">
          <label for="title">제목</label>
          <input id="title" name="title" type="text" placeholder="예: 백종원 김치찌개, 크리스피 치킨" required>
        </div>
        <div class="form__row">
          <label for="url">링크</label>
          <input id="url" name="url" type="url" placeholder="https://youtu.be/..." required>
        </div>
        <div class="form__row">
          <label for="notes">메모</label>
          <textarea id="notes" name="notes" rows="3" placeholder="맛포인트, 재료비, 우리집 버전"></textarea>
        </div>
        <div class="form__grid">
          <div class="form__row">
            <label for="tags">태그</label>
            <input id="tags" name="tags" type="text" placeholder="초간단, 캠핑, 국물">
          </div>
          <div class="form__row">
            <label for="cuisine">분류</label>
            <select id="cuisine" name="cuisine">
              <option value="auto">자동 분류</option>
              <option value="korean">한식</option>
              <option value="chinese">중식</option>
              <option value="japanese">일식</option>
              <option value="western">양식</option>
              <option value="asian">아시안</option>
              <option value="dessert">디저트</option>
              <option value="snack">간식</option>
              <option value="fusion">퓨전</option>
              <option value="other">기타</option>
            </select>
          </div>
          <div class="form__row">
            <label for="source">출처</label>
            <select id="source" name="source">
              <option value="youtube">YouTube / Shorts</option>
              <option value="blog">블로그</option>
              <option value="instagram">인스타 / 릴스</option>
              <option value="other">기타</option>
            </select>
          </div>
        </div>
        <div class="form__row">
          <label>준비 재료</label>
          <div class="ingredient-inputs">
            <input id="ingredientInput" type="text" placeholder="예: 꼬막살">
            <input id="ingredientAmount" type="text" placeholder="예: 600g">
            <button type="button" id="addIngredientBtn" class="btn btn-ghost">추가</button>
          </div>
          <ul id="ingredientList" class="ingredient-list"></ul>
        </div>
        <div class="form__actions">
          <button type="submit" class="btn btn-primary">저장</button>
          <button type="button" id="resetBtn" class="btn btn-ghost">입력 초기화</button>
        </div>
      </form>
    </div>
  </div>

  <template id="recipeCardTemplate">
    <article class="recipe">
      <div class="recipe__header">
        <div class="recipe__headline">
          <div class="recipe__title-row">
            <h3 data-title></h3>
            <span class="recipe__cuisine" data-cuisine-pill hidden></span>
          </div>
        </div>
        <div class="recipe__header-actions">
          <button type="button" class="recipe__favorite" data-toggle-favorite aria-pressed="false" aria-label="즐겨찾기 추가">☆</button>
          <button type="button" class="recipe__toggle" data-toggle-details aria-expanded="false" aria-label="상세 보기"></button>
        </div>
      </div>
      <div class="recipe__preview" data-preview></div>
      <div class="recipe__details" data-details hidden>
        <div class="recipe__meta-block" data-meta-block hidden>
          <p class="recipe__meta" data-tags></p>
        </div>
        <p class="recipe__notes" data-notes hidden></p>
        <div class="ingredients" data-ingredients-section hidden>
          <div class="ingredients__header">
            <p class="badge badge--muted">재료</p>
            <button class="icon-btn" data-add-ingredient title="재료 편집">✎</button>
          </div>
          <ul class="ingredient-chips" data-ingredients></ul>
        </div>
        <div class="recipe__actions">
          <input type="file" accept="image/*" data-photo-input hidden>
          <button class="icon-btn" data-upload-photo title="내 사진 올리기">📷</button>
          <button class="icon-btn" data-delete-photo title="내 사진 삭제" hidden>🖼️</button>
          <button class="icon-btn" data-open title="링크 열기">🔗</button>
          <button class="icon-btn" data-edit title="수정">✎</button>
          <button class="icon-btn" data-delete title="삭제">🗑️</button>
        </div>
      </div>
    </article>
  </template>

  <div id="ingredientDrawer" class="drawer drawer--modal">
    <div class="drawer__backdrop" id="ingDrawerBackdrop"></div>
    <div class="drawer__panel">
      <div class="drawer__header">
        <div>
          <p class="eyebrow">재료 추가</p>
          <h2>이 레시피에 재료 더하기</h2>
        </div>
        <button id="closeIngDrawerBtn" class="icon-btn" aria-label="닫기">✕</button>
      </div>
      <div class="form">
        <div class="form__row">
          <label for="ingModalName">재료명</label>
          <input id="ingModalName" type="text" placeholder="예: 미나리">
        </div>
        <div class="form__row">
          <label for="ingModalAmount">수량/단위</label>
          <input id="ingModalAmount" type="text" placeholder="예: 100g, 2큰술">
        </div>
        <div class="form__actions">
          <button type="button" id="ingModalAddBtn" class="btn btn-primary">추가</button>
        </div>
        <ul id="ingModalList" class="ingredient-list"></ul>
      </div>
    </div>
  </div>

  <script src="app.js?v=33" type="module"></script>
</body>
</html>
